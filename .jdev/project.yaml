name: harvest-gui
version: 0.1.0
language: null
package_manager: null
use_mcp_backend: true
commands:
  test: uv run pytest tests/ -v
  lint: uv run ruff check .
  format: uv run ruff format .
  typecheck: uv run mypy . --ignore-missing-imports
  security: uv run bandit -r . -c pyproject.toml
progress:
  backend: tmux
  tools:
  - name: pytest
    pattern: PASSED|FAILED|ERROR
  - name: ruff
    pattern: Found \d+ error
tabs:
- name: Main
  icon: "\U0001F3E0"
  color: '#2850C8'
- name: harvest-gui-CC
  icon: "\U0001F916"
  color: '#28B428'
  background_color: '#0D1117'
  foreground_color: '#7EE787'
  command: claude --dangerously-skip-permissions --append-system-prompt-file ~/.jdev/methodology/prompts/CC_SYSTEM_PROMPT.md
  initial_prompt: /cc-start
- name: harvest-gui-CA
  icon: "\U0001F9D0"
  color: '#B428B4'
  command: claude --dangerously-skip-permissions --append-system-prompt-file ~/.jdev/methodology/prompts/CA_SYSTEM_PROMPT.md
  initial_prompt: /ca-start
- name: harvest-gui-CD
  icon: "\U0001F3AF"
  color: '#2896C8'
  background_color: '#1A1B2E'
  foreground_color: '#B0C4DE'
  command: claude --dangerously-skip-permissions --append-system-prompt-file ~/.jdev/methodology/prompts/CD_SYSTEM_PROMPT.md
  initial_prompt: /cd-start
- name: harvest-gui-CR
  icon: "\U0001F50D"
  color: '#C8A028'
  command: claude --dangerously-skip-permissions --append-system-prompt-file ~/.jdev/methodology/prompts/CR_SYSTEM_PROMPT.md
  initial_prompt: /cr-start
- name: Adm
  icon: "\u2699"
  color: '#C85028'
  command: jdev logs
forbidden_commands:
- pattern: rm -rf /
  reason: System safety
- pattern: git push --force
  reason: History safety
- pattern: jdev stop
  reason: Kills dev environment
docs:
  sessions: docs/sessions/
  design: docs/design/
  audits: docs/audits/
